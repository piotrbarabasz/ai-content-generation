name: agent-system-validation

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate-agent-system:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -e .

      - name: Run unit tooling tests
        run: python -m pytest backend/tests/unit/tooling

      - name: Validate workstream guard
        run: python -m backend.app.tooling.workstream_validation

      - name: Validate repository task metadata
        run: python -m backend.app.tooling.repository_checks --mode task-metadata --json

      - name: Check diff formatting
        run: git --no-pager diff --check
