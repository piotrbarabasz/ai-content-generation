name: agent-system-validation

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate-agent-system:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -e .

      - name: Run agent system hooks
        run: python -m backend.app.tooling.git_hook_runner ci
